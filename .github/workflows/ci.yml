name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout jeeves-core (path dependency)
        uses: actions/checkout@v4
        with:
          repository: Jeeves-Cluster-Organization/jeeves-core
          path: ../jeeves-core

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cargo check (rlib only)
        run: cargo check

      - name: Cargo check (all features)
        run: cargo check --all-features

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        rust: [stable, "1.75"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout jeeves-core
        uses: actions/checkout@v4
        with:
          repository: Jeeves-Cluster-Organization/jeeves-core
          path: ../jeeves-core

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --verbose

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check
